<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360">
  <defs>
    <style>
      @keyframes spin { 100% { transform: rotate(360deg); } }
      .ring1 { transform-origin: 160px 180px; animation: spin 20s linear infinite; }
      .ring2 { transform-origin: 160px 180px; animation: spin 15s linear infinite reverse; }
      .ring3 { transform-origin: 160px 180px; animation: spin 10s linear infinite; }
      
      @keyframes fillRust { from { width: 0; } to { width: 380px; } }
      @keyframes fillPy { from { width: 0; } to { width: 37px; } }
      @keyframes fillJS { from { width: 0; } to { width: 21px; } }
      
      .bar-rust { animation: fillRust 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
      .bar-py { animation: fillPy 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s forwards; width: 0; }
      .bar-js { animation: fillJS 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.4s forwards; width: 0; }
      
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .blink { animation: blink 1s step-end infinite; }
      
      .row { transition: all 0.3s; cursor: crosshair; }
      .row:hover .label { fill: #ff2a2a; filter: drop-shadow(0 0 4px #ff2a2a); }
      .row:hover .val { fill: #ffffff; }
    </style>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Паттерн для сегментации полос -->
    <pattern id="seg" width="12" height="20" patternUnits="userSpaceOnUse">
      <rect x="10" y="0" width="2" height="20" fill="#050508" />
    </pattern>

    <!-- Паттерн сетки фона -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#111118" stroke-width="1" />
    </pattern>

    <mask id="mask-rust"><rect class="bar-rust" x="320" y="140" height="20" fill="white" /></mask>
    <mask id="mask-py"><rect class="bar-py" x="320" y="200" height="20" fill="white" /></mask>
    <mask id="mask-js"><rect class="bar-js" x="320" y="260" height="20" fill="white" /></mask>
  </defs>

  <!-- Фон -->
  <rect width="100%" height="100%" fill="#050508" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Рамка терминала -->
  <path d="M 20 0 L 780 0 L 800 20 L 800 360 L 20 360 L 0 340 L 0 20 Z" fill="none" stroke="#ff2a2a" stroke-width="2" opacity="0.5" />
  <path d="M 24 4 L 776 4 L 796 24 L 796 356 L 24 356 L 4 336 L 4 24 Z" fill="none" stroke="#4a0000" stroke-width="1" />

  <!-- Верхняя панель (Title Bar) -->
  <rect x="0" y="0" width="800" height="30" fill="#ff2a2a" opacity="0.1" />
  <line x1="0" y1="30" x2="800" y2="30" stroke="#ff2a2a" stroke-width="1" opacity="0.5" />
  <text x="20" y="20" font-family="'Courier New', monospace" font-size="12" fill="#ff2a2a" font-weight="bold">SYS.DIAGNOSTICS // LANGUAGE_PROFILER</text>
  <text x="780" y="20" font-family="'Courier New', monospace" font-size="12" fill="#ffffff" text-anchor="end">v9.4.2 <tspan class="blink">_</tspan></text>

  <!-- ЛЕВАЯ ЧАСТЬ: Вращающееся ядро -->
  <g transform="translate(0, 0)">
    <!-- Внешнее кольцо -->
    <circle class="ring1" cx="160" cy="180" r="90" fill="none" stroke="#4a0000" stroke-width="4" stroke-dasharray="10 20" />
    <!-- Среднее кольцо -->
    <circle class="ring2" cx="160" cy="180" r="75" fill="none" stroke="#ff2a2a" stroke-width="2" stroke-dasharray="40 10 5 10" filter="url(#glow)" opacity="0.8" />
    <!-- Внутреннее кольцо -->
    <circle class="ring3" cx="160" cy="180" r="60" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="2 6" opacity="0.5" />
    
    <!-- Центр -->
    <polygon points="160,150 186,195 134,195" fill="none" stroke="#ff2a2a" stroke-width="2" filter="url(#glow)" />
    <circle cx="160" cy="180" r="10" fill="#ff2a2a" filter="url(#glow)" />
    
    <!-- Перекрестие -->
    <line x1="160" y1="70" x2="160" y2="290" stroke="#ff2a2a" stroke-width="1" opacity="0.3" />
    <line x1="50" y1="180" x2="270" y2="180" stroke="#ff2a2a" stroke-width="1" opacity="0.3" />
    
    <text x="160" y="310" font-family="'Courier New', monospace" font-size="10" fill="#4a0000" text-anchor="middle" letter-spacing="2">CORE_LOAD: OPTIMAL</text>
  </g>

  <!-- Вертикальный разделитель -->
  <line x1="290" y1="50" x2="290" y2="310" stroke="#4a0000" stroke-width="2" stroke-dasharray="4 4" />

  <!-- ПРАВАЯ ЧАСТЬ: Данные -->
  <g font-family="'Courier New', monospace">
    
    <!-- RUST -->
    <g class="row">
      <text class="label" x="320" y="130" font-size="14" fill="#ffffff" font-weight="bold" letter-spacing="1">> RUST_CORE</text>
      <text class="val" x="760" y="130" font-size="14" fill="#ff2a2a" font-weight="bold" text-anchor="end" filter="url(#glow)">86.73%</text>
      
      <!-- Фон полосы -->
      <rect x="320" y="140" width="440" height="20" fill="#111118" stroke="#4a0000" stroke-width="1" />
      <!-- Заполнение (под маской) -->
      <rect x="320" y="140" width="440" height="20" fill="#ff2a2a" mask="url(#mask-rust)" filter="url(#glow)" />
      <!-- Сегментация (поверх) -->
      <rect x="320" y="140" width="440" height="20" fill="url(#seg)" />
    </g>

    <!-- PYTHON -->
    <g class="row">
      <text class="label" x="320" y="190" font-size="14" fill="#ffffff" font-weight="bold" letter-spacing="1">> PYTHON_ENV</text>
      <text class="val" x="760" y="190" font-size="14" fill="#ff2a2a" font-weight="bold" text-anchor="end">8.45%</text>
      
      <rect x="320" y="200" width="440" height="20" fill="#111118" stroke="#4a0000" stroke-width="1" />
      <rect x="320" y="200" width="440" height="20" fill="#ff2a2a" mask="url(#mask-py)" />
      <rect x="320" y="200" width="440" height="20" fill="url(#seg)" />
    </g>

    <!-- JAVASCRIPT -->
    <g class="row">
      <text class="label" x="320" y="250" font-size="14" fill="#ffffff" font-weight="bold" letter-spacing="1">> JS_RUNTIME</text>
      <text class="val" x="760" y="250" font-size="14" fill="#ff2a2a" font-weight="bold" text-anchor="end">4.82%</text>
      
      <rect x="320" y="260" width="440" height="20" fill="#111118" stroke="#4a0000" stroke-width="1" />
      <rect x="320" y="260" width="440" height="20" fill="#ff2a2a" mask="url(#mask-js)" />
      <rect x="320" y="260" width="440" height="20" fill="url(#seg)" />
    </g>

  </g>

  <!-- Нижняя панель (Footer) -->
  <line x1="0" y1="330" x2="800" y2="330" stroke="#ff2a2a" stroke-width="1" opacity="0.5" />
  <text x="20" y="348" font-family="'Courier New', monospace" font-size="10" fill="#4a0000">MEM: 0x00F8A2 | THREADS: 12 | STATUS: <tspan fill="#ff2a2a">LOCKED</tspan></text>
  <text x="780" y="348" font-family="'Courier New', monospace" font-size="10" fill="#4a0000" text-anchor="end">NO MERCY · PROPRIETARY</text>

</svg>
