<svg xmlns="http://www.w3.org/2000/svg" width="360" height="72" viewBox="0 0 360 72">
  <defs>
    <style>
      .btn { cursor: pointer; }
      .bg { fill: #050508; transition: fill 0.3s; }
      .btn:hover .bg { fill: #0a0a12; }
      .text-main { transition: fill 0.3s; }
      .btn:hover .text-main { fill: #ff2a2a; }
      
      @keyframes scan { 0% { transform: translateX(-100px); } 100% { transform: translateX(360px); } }
      .scanner { animation: scan 2.5s linear infinite; }
      
      @keyframes spin { 100% { transform: rotate(360deg); } }
      .radar { transform-origin: 36px 36px; animation: spin 8s linear infinite; }
      .radar-reverse { transform-origin: 36px 36px; animation: spin 12s linear infinite reverse; }
      
      @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
      .node { animation: pulse 2s ease-in-out infinite; }
    </style>
    
    <filter id="neon">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <clipPath id="btn-clip">
      <polygon points="12,0 360,0 360,60 348,72 0,72 0,12" />
    </clipPath>
  </defs>

  <g class="btn">
    <!-- База со скошенными углами -->
    <polygon class="bg" points="12,0 360,0 360,60 348,72 0,72 0,12" />
    <polygon points="12,0 360,0 360,60 348,72 0,72 0,12" fill="none" stroke="#ff2a2a" stroke-width="1.5" />
    
    <!-- Декоративные элементы -->
    <rect x="0" y="12" width="4" height="20" fill="#ff2a2a" />
    <rect x="356" y="40" width="4" height="20" fill="#ff2a2a" />
    <path d="M 15 4 L 30 4 M 330 68 L 345 68" stroke="#4a0000" stroke-width="2" />

    <!-- Иконка: Сетевой узел -->
    <g>
      <circle cx="36" cy="36" r="16" fill="none" stroke="#4a0000" stroke-width="1" />
      <circle class="radar" cx="36" cy="36" r="16" fill="none" stroke="#ff2a2a" stroke-width="2" stroke-dasharray="10 40" filter="url(#neon)" />
      <circle class="radar-reverse" cx="36" cy="36" r="10" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="4 15" opacity="0.5" />
      
      <circle class="node" cx="36" cy="36" r="3" fill="#ff2a2a" filter="url(#neon)" />
      <path d="M 36 36 L 46 26 M 36 36 L 26 42 M 36 36 L 42 46" stroke="#ff2a2a" stroke-width="1" opacity="0.6" />
      <circle cx="46" cy="26" r="1.5" fill="#fff" />
      <circle cx="26" cy="42" r="1.5" fill="#fff" />
      <circle cx="42" cy="46" r="1.5" fill="#fff" />
    </g>

    <!-- Разделитель -->
    <line x1="72" y1="16" x2="72" y2="56" stroke="#4a0000" stroke-width="2" stroke-dasharray="4 4" />

    <!-- Текст -->
    <text x="88" y="28" font-family="'Courier New', monospace" font-size="10" fill="#ff2a2a" letter-spacing="2" font-weight="bold">UPLINK // ESTABLISHED</text>
    <text class="text-main" x="88" y="52" font-family="'Courier New', monospace" font-size="22" fill="#ffffff" font-weight="bold" letter-spacing="1">0xavia.xyz</text>

    <!-- Анимированный сканер -->
    <g clip-path="url(#btn-clip)">
      <rect class="scanner" x="0" y="0" width="40" height="72" fill="url(#scan-grad)" opacity="0.4" />
      <line class="scanner" x1="0" y1="0" x2="0" y2="72" stroke="#ffffff" stroke-width="1" opacity="0.8" />
    </g>
    
    <linearGradient id="scan-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2a2a" stop-opacity="0" />
      <stop offset="100%" stop-color="#ff2a2a" stop-opacity="1" />
    </linearGradient>
  </g>
</svg>
